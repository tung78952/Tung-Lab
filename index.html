<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tung Lab — Apps by Tung</title>
  <meta name="description" content="Tung Lab — small apps built for real workflows. Direct downloads, guides, and screenshots." />
  <meta name="theme-color" content="#faf8f4" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg?v=20260605" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=20260605" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png?v=20260605" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png?v=20260605" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Handjet:wght@400;600;700&family=Pixelify+Sans:wght@400..700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ===== THEME TOKENS — Claude-style warm palette ===== */
    :root, :root[data-theme="light"] {
      --bg:#faf8f4; --surface:#ffffff; --surface-2:#f7f3ec;
      --ink:#22201c; --ink-soft:#55514a; --muted:#928d83;
      --border:#e8e3d8; --shadow:#22201c; --hl:#ffffff;
      --accent:#cc6b4e; --accent-lt:#e29274; --accent-soft:#f6e7df; --accent-ink:#8a4429;
      --accent2:#5e89ad; --avatar-dk:#211d1a; --skin:#e6b289;
      --warn-bg:#faf1d7; --warn-border:#ecd698; --warn-ink:#6b531a;
      --band:#22201c; --band-ink:#f4efe6; --band-muted:#a8a298; --band-border:#3a362f;
    }
    :root[data-theme="dark"] {
      --bg:#1b1a17; --surface:#262420; --surface-2:#2e2b26;
      --ink:#f3eee4; --ink-soft:#cbc5b8; --muted:#928d82;
      --border:#3a362f; --shadow:#9f5b43; --hl:#f3eee4;
      --accent:#e08a5f; --accent-lt:#eaa888; --accent-soft:#392c24; --accent-ink:#f0c4a8;
      --accent2:#73a3c6; --avatar-dk:#4a443c; --skin:#e6b289;
      --warn-bg:#332a18; --warn-border:#5c4a24; --warn-ink:#e8cf94;
      --band:#141311; --band-ink:#f3eee4; --band-muted:#928d82; --band-border:#34302a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow-x: hidden; }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      transition: background .25s ease, color .25s ease;
    }
    ::selection { background: var(--accent); color: #fff; }
    .navlink:hover { color: var(--accent) !important; }
    .appcard { transition: transform .14s ease, box-shadow .14s ease; }
    .appcard:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0 var(--shadow); }
    .hero-mascot-button .hero-mascot-frame {
      transition: transform .18s ease, filter .18s ease;
    }
    .hero-mascot-button:hover .hero-mascot-frame,
    .hero-mascot-button:focus-visible .hero-mascot-frame {
      transform: translateY(-4px);
      filter: drop-shadow(0 10px 0 color-mix(in srgb, var(--shadow) 22%, transparent));
    }
    .mascot-hint {
      opacity: .74;
      transition: opacity .16s ease, transform .16s ease, box-shadow .16s ease;
    }
    .hero-mascot-button:hover .mascot-hint,
    .hero-mascot-button:focus-visible .mascot-hint {
      opacity: 1;
      transform: translateX(-50%) translateY(-3px) rotate(-2deg) !important;
      box-shadow: 4px 4px 0 var(--shadow) !important;
    }
    .mascot-hint-dot {
      animation: hintPulse 2.2s ease-in-out infinite;
    }
    .about-pixel-arrow-cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      min-width: 236px;
      height: 58px;
      padding: 0 58px 0 22px;
      border: 2px solid var(--accent);
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 58%, var(--ink)), 5px 5px 0 var(--shadow);
      transition: transform .14s ease, box-shadow .14s ease, background .14s ease;
    }
    .about-pixel-arrow-deco {
      display: inline-flex;
      gap: 5px;
      flex: 0 0 auto;
    }
    .about-pixel-arrow-deco span {
      width: 8px;
      height: 8px;
      background: var(--accent);
      display: block;
    }
    .about-pixel-arrow-label {
      position: relative;
      z-index: 2;
      line-height: 1;
      white-space: nowrap;
    }
    .about-pixel-arrow-head {
      position: absolute;
      right: -28px;
      top: 50%;
      width: 42px;
      height: 42px;
      transform: translateY(-50%);
      transition: transform .14s ease;
    }
    .about-pixel-arrow-head span {
      position: absolute;
      right: 0;
      display: block;
      background: var(--surface);
      border: 2px solid var(--accent);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 58%, var(--ink));
      transition: background .14s ease;
    }
    .about-pixel-arrow-head span:nth-child(1) {
      top: 0;
      width: 18px;
      height: 14px;
      border-bottom: 0;
    }
    .about-pixel-arrow-head span:nth-child(2) {
      top: 12px;
      width: 34px;
      height: 18px;
    }
    .about-pixel-arrow-head span:nth-child(3) {
      bottom: 0;
      width: 18px;
      height: 14px;
      border-top: 0;
    }
    .about-pixel-arrow-cta:hover,
    .about-pixel-arrow-cta:focus-visible {
      transform: translate(-2px, -2px);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 58%, var(--ink)), 7px 7px 0 var(--shadow);
      outline: none;
    }
    .about-pixel-arrow-cta:hover,
    .about-pixel-arrow-cta:focus-visible,
    .about-pixel-arrow-cta:hover .about-pixel-arrow-head span,
    .about-pixel-arrow-cta:focus-visible .about-pixel-arrow-head span {
      background: color-mix(in srgb, var(--surface) 86%, var(--accent-soft));
    }
    .about-pixel-arrow-cta:hover .about-pixel-arrow-head,
    .about-pixel-arrow-cta:focus-visible .about-pixel-arrow-head {
      transform: translate(3px, -50%);
    }
    .project-note {
      transform: rotate(var(--note-rotate, 0deg));
      transform-origin: 50% 10%;
      transition: transform .18s ease, box-shadow .18s ease;
      will-change: transform;
    }
    .project-note:hover {
      transform: translateY(-10px) rotate(var(--note-hover-rotate, 0deg)) skewY(-0.8deg);
      box-shadow: 11px 15px 0 var(--shadow) !important;
    }
    .project-github-link {
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
      cursor: pointer;
    }
    .project-github-link:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 var(--shadow) !important;
      background: var(--accent) !important;
      color: #fff !important;
    }
    .interest-card {
      transition: transform .14s ease, box-shadow .14s ease;
    }
    .interest-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--shadow) !important;
    }
    .interest-card:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }
    :root[data-theme="dark"] .interest-card .sprite {
      filter: drop-shadow(0 0 0 rgba(243,238,228,0.55))
              drop-shadow(2px 0 0 rgba(243,238,228,0.45))
              drop-shadow(-2px 0 0 rgba(243,238,228,0.45))
              drop-shadow(0 2px 0 rgba(243,238,228,0.45))
              drop-shadow(0 -2px 0 rgba(243,238,228,0.45));
    }
    .interest-hint-dot {
      animation: hintPulse 2.2s ease-in-out infinite;
    }
    .interest-card:hover .interest-hint-dot {
      animation: hintPulseHover 1.1s ease-in-out infinite;
    }
    @keyframes hintPulse {
      0%,100% { transform: scale(1); opacity: 0.45; box-shadow: 0 0 0 0 var(--accent); }
      50%      { transform: scale(1.35); opacity: 0.9; box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 22%, transparent); }
    }
    @keyframes hintPulseHover {
      0%,100% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 35%, transparent); }
      50%      { transform: scale(1.6); opacity: 1; box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 18%, transparent); }
    }
    .interest-music-on .sprite { animation: bob .42s ease-in-out infinite; }
    .interest-flash { animation: flashPop .5s ease-out forwards; }
    .interest-polaroid { animation: polaroidOut 1.15s ease-out forwards; }
    .interest-note { animation: floatUp 1.25s ease-out forwards; }
    .interest-glow { animation: screenFlicker .18s steps(2) 8; }
    .interest-shimmer { animation: shimmer 1s ease-out forwards; }
    .interest-goal { animation: goalPop 1.2s ease-out forwards; }
    @keyframes flashPop { 0% { opacity: 0; } 8% { opacity: .96; } 100% { opacity: 0; } }
    @keyframes polaroidOut {
      0% { opacity: 0; transform: translateY(-8px) rotate(-4deg) scale(.6); }
      28% { opacity: 1; }
      100% { opacity: 1; transform: translateY(34px) rotate(4deg) scale(1); }
    }
    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(8px) scale(.7); }
      14% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-48px) scale(1.12); }
    }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    @keyframes screenFlicker { 0%,100% { opacity: .5; } 50% { opacity: .95; } }
    @keyframes shimmer {
      0% { opacity: 0; transform: translateY(5px) scale(.6); }
      30% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-24px) scale(1.2); }
    }
    @keyframes goalPop {
      0% { opacity: 0; transform: translateX(-50%) scale(.45); }
      24% { opacity: 1; transform: translateX(-50%) scale(1.12); }
      82% { opacity: 1; transform: translateX(-50%) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) scale(.92); }
    }
    .shots-scroll { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .shots-scroll::-webkit-scrollbar { height: 8px; }
    .shots-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .shot-link:hover {
      transform: scale(1.045);
      box-shadow: 8px 8px 0 var(--shadow) !important;
      z-index: 2;
    }
    button.shot-link {
      font: inherit;
      text-align: inherit;
    }
    .coffee-steam-wisp {
      animation: coffeeSteam 2.4s ease-in-out infinite;
      image-rendering: pixelated;
    }
    .coffee-steam-wisp:nth-child(2) { animation-delay: .45s; }
    .coffee-steam-wisp:nth-child(3) { animation-delay: .9s; }
    @keyframes coffeeSteam {
      0% { opacity: 0; transform: translateY(8px) scale(.88); }
      22% { opacity: .92; }
      72% { opacity: .7; }
      100% { opacity: 0; transform: translateY(-16px) scale(1.05); }
    }

    /* responsive */
    @media (max-width: 900px) {
      .hero-grid { grid-template-columns: 1fr !important; }
      .detail-grid { grid-template-columns: 1fr !important; }
      .portfolio-hero { grid-template-columns: 1fr !important; }
      .portfolio-two { grid-template-columns: 1fr !important; }
      .portfolio-card-grid { grid-template-columns: 1fr !important; }
      .skills-grid { grid-template-columns: 1fr 1fr !important; }
      .interest-grid { grid-template-columns: 1fr 1fr !important; }
      .gallery-grid { grid-template-columns: 1fr 1fr !important; }
      .dl-panel { position: static !important; }
      .appcard-row { grid-template-columns: auto 1fr !important; }
      .cardrow-cta { grid-column: 1 / -1; flex-direction: row !important; }
    }
    @media (max-width: 620px) {
      .site-header-inner { padding: 10px 16px !important; align-items: flex-start !important; gap: 10px !important; }
      .site-brand { gap: 8px !important; }
      .site-brand-text { font-size: 22px !important; }
      .site-nav { justify-content: flex-end !important; flex-wrap: wrap !important; gap: 2px !important; max-width: 178px !important; }
      .site-nav .navlink { padding: 6px 8px !important; font-size: 13px !important; }
      .theme-toggle { margin-left: 4px !important; width: 34px !important; height: 32px !important; }
      .lang-switch { margin-left: 4px !important; }
      .lang-switch button { padding: 5px 8px !important; }
      .hero-grid { gap: 28px !important; }
      .hero-grid, .detail-grid { width: 100% !important; padding-left: 16px !important; padding-right: 16px !important; }
      .hero-mascot-frame { width: min(380px, 100%) !important; height: 330px !important; }
      .detail-title-block { flex-wrap: wrap !important; gap: 14px !important; }
      .detail-title-row { flex-wrap: wrap !important; }
      .detail-title-row h1 { font-size: 40px !important; }
      .gallery-grid { gap: 20px !important; }
      .gallery-grid { grid-template-columns: 1fr !important; }
      .skills-grid, .interest-grid { grid-template-columns: 1fr !important; }
      .appcard-row { grid-template-columns: 1fr !important; }
      .cardrow-cta { flex-direction: column !important; }
      .shots-scroll { grid-auto-columns: minmax(260px, 86vw) !important; }
    }
  </style>
</head>
